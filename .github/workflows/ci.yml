name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Lint with ruff
      continue-on-error: true  # advisory: many style lints in scientific code, see #lint-cleanup
      run: |
        ruff check garuda/

    - name: Type check with mypy
      continue-on-error: true  # advisory: codebase is not fully type-annotated yet
      run: |
        mypy garuda/ --ignore-missing-imports

    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=garuda --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  docs:
    runs-on: ubuntu-latest
    needs: test
    # Don't fail the whole workflow on docs build issues — the Sphinx tree
    # is still being shaped up. Re-enable strictness once docs build clean.
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -e ".[docs]"

    - name: Build docs
      run: |
        # docs/ has no Makefile yet; call sphinx-build directly.
        sphinx-build -b html docs docs/_build/html

    - name: Deploy docs (on main only)
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/_build/html
